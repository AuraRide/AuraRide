name: API Build & Deploy

on:
  push:
    branches: [main, mvp-a]
    paths:
      - "apps/api/**"
      - "packages/types/**"
      - ".github/workflows/api.yml"
  workflow_dispatch:

concurrency:
  group: api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: apps/api/go.sum

      - name: Setup Chinese mirror (GOPROXY)
        run: |
          echo "GOPROXY=https://goproxy.cn,direct" >> $GITHUB_ENV
          echo "GOSUMDB=off" >> $GITHUB_ENV

      - name: Tidy + Build + Test
        working-directory: apps/api
        run: |
          go mod tidy
          go build -o bin/api -ldflags="-s -w -X main.Version=${{ github.sha }}" ./cmd/api
          go test ./... -race -count=1

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: auraride-api-${{ github.sha }}
          path: apps/api/bin/api
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/mvp-a'
    continue-on-error: true # 服务器未 ready / SSH key 未配时不阻塞 CI
    steps:
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: auraride-api-${{ github.sha }}
          path: ./bin

      - name: Check SSH secrets configured
        id: precheck
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ] || [ -z "$DEPLOY_SSH_HOST" ]; then
            echo "::warning::DEPLOY_SSH_KEY / DEPLOY_SSH_HOST not set in repo secrets — skipping deploy(等 chenzhuowen 配 SSH 后启用)"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup SSH
        if: steps.precheck.outputs.skip != 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: scp + atomic restart
        if: steps.precheck.outputs.skip != 'true'
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          chmod +x bin/api
          ssh-keyscan -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts
          scp bin/api deploy@"$DEPLOY_SSH_HOST":/opt/auraride/bin/api.new
          ssh deploy@"$DEPLOY_SSH_HOST" '
            mv /opt/auraride/bin/api.new /opt/auraride/bin/api &&
            sudo systemctl restart auraride-api &&
            sleep 2 &&
            curl -sf http://localhost:8080/healthz
          '
