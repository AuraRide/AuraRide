name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main, mvp-a]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # for VitePress lastUpdated

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2 # pin to local version; bare "11" floats to latest which may need newer Node

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build VitePress site
        run: pnpm docs:build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    # Deploy from main OR mvp-a (current active dev branch). Both are explicitly
    # allowed in the github-pages environment deployment-branch-policies. Other
    # feature branches still build for CI gate but skip deploy.
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/mvp-a'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
