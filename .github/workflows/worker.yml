name: Worker Build & Deploy

on:
  push:
    branches: [main, mvp-a]
    paths:
      - "apps/worker/**"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - ".github/workflows/worker.yml"
  workflow_dispatch:

concurrency:
  group: worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Sync + Test + Lint
        working-directory: apps/worker
        env:
          UV_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
        run: |
          uv sync --frozen
          uv run pytest -q
          uv run ruff check .

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # 只有 main 部署 prod worker;mvp-a push 只跑 test/lint(避免覆盖生产后端)
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - name: Check SSH secrets
        id: precheck
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ] || [ -z "$DEPLOY_SSH_HOST" ]; then
            echo "::warning::DEPLOY_SSH_KEY / DEPLOY_SSH_HOST not configured — skipping worker deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup SSH
        if: steps.precheck.outputs.skip != 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: ssh server → git pull + docker compose build/up worker
        if: steps.precheck.outputs.skip != 'true'
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          ssh-keyscan -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts
          ssh deploy@"$DEPLOY_SSH_HOST" '/opt/auraride/infra/scripts/deploy.sh worker'
